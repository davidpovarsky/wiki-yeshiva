workflows:
  ios-debug-build:
    name: iOS Debug Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: List schemes
        script: |
          xcodebuild -list -project Wikipedia.xcodeproj

      - name: Run project setup
        script: |
          ./scripts/setup

      - name: Build for iOS Simulator
        script: |
          xcodebuild \
            -project Wikipedia.xcodeproj \
            -scheme Wikipedia \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - build/DerivedData/Build/Products/Debug-iphonesimulator/*.dSYM
      - /tmp/xcodebuild_logs/*.log
