name: iOS Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Wikipedia iOS
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          elif [ -d /Applications/Xcode_26.1.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.1.1.app
          elif [ -d /Applications/Xcode_26.0.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.1.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Generate open source build configuration
        run: |
          bash scripts/setup_bundle_id ci
          test -f Configurations/OpenSourceDebug.xcconfig

      - name: Show available schemes
        run: |
          xcodebuild -list -project Wikipedia.xcodeproj

      - name: Build app for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Wikipedia.xcodeproj \
            -scheme Wikipedia \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath Build \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee xcodebuild.log

      - name: Package simulator app
        run: |
          set -e
          app_path=$(find Build/Build/Products/Debug-iphonesimulator -maxdepth 2 -name '*.app' -type d | head -n 1)
          if [ -z "$app_path" ]; then
            echo 'No .app bundle found in simulator build products.'
            find Build/Build/Products -maxdepth 4 -type d || true
            exit 1
          fi
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifacts/Wikipedia-simulator-app.zip
          ls -lh artifacts

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wikipedia-simulator-app
          path: artifacts/Wikipedia-simulator-app.zip
          if-no-files-found: error
          retention-days: 7

      - name: Print build errors
        if: failure()
        run: |
          echo '---- xcodebuild errors ----'
          grep -n -i -E '(^|[^A-Za-z])(error:|fatal error:|Command .* failed|BUILD FAILED|No .app bundle found)' xcodebuild.log | tail -80 || true
